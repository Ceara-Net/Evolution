<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki | Evolution Hub</title>
    <link rel="icon" href="../assets/images/favicon/favicon.png" type="image/x-icon">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="../css/global-style.css">
    <link rel="stylesheet" href="../css/wiki-style.css">
</head>
<body class="dark-theme">

    <div class="wiki-wrapper">
        
        <aside class="wiki-sidebar" id="wiki-sidebar-element">
            <div class="sidebar-header-controls">
                <div class="header-left-group">
                    <button id="sidebar-back-btn" class="btn-sidebar-action" title="Voltar para a Home">
                        <span class="material-symbols-rounded">arrow_back</span>
                    </button>
                    <div class="sidebar-brand-text">
                        <h2>Wiki</h2>
                    </div>
                </div>
                <button id="sidebar-toggle-btn" class="btn-sidebar-action" title="Alternar Menu">
                    <span class="material-symbols-rounded id-icon-expand">menu</span>
                    <span class="material-symbols-rounded id-icon-collapse">menu_open</span>
                </button>
            </div>
    
            <nav class="sidebar-nav">
                <ul id="wiki-menu-links"></ul>
            </nav>
        </aside>

        <main class="wiki-reader-area">
            <article class="markdown-body" id="markdown-render-target">
            </article>
        </main>

        <aside class="wiki-toc-area">
            <div class="toc-sticky-container">
                <div class="toc-header">
                    <span class="material-symbols-rounded">toc</span>
                    <h3>Nesta Página</h3>
                </div>
                <ul id="article-toc-links" class="toc-links-list">
                </ul>
            </div>
        </aside>

    </div>

    <script type="module" src="../js/wiki/main.js"></script>
</body>
</html>
